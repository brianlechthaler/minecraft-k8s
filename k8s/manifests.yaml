apiVersion: v1
kind: Namespace
metadata:
  name: minecraft
  labels:
    app.kubernetes.io/name: survival
    app.kubernetes.io/component: minecraft-server
    app.kubernetes.io/managed-by: minecraft-k8s
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: survival-config
  namespace: minecraft
  labels:
    app.kubernetes.io/name: survival
    app.kubernetes.io/component: minecraft-server
    app.kubernetes.io/managed-by: minecraft-k8s
data:
  server.properties: |
    motd=Modded Minecraft on Kubernetes
    max-players=20
    server-port=25565
    online-mode=true
    enable-rcon=true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: survival-data
  namespace: minecraft
  labels:
    app.kubernetes.io/name: survival
    app.kubernetes.io/component: minecraft-server
    app.kubernetes.io/managed-by: minecraft-k8s
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: survival-mods
  namespace: minecraft
  labels:
    app.kubernetes.io/name: survival
    app.kubernetes.io/component: minecraft-server
    app.kubernetes.io/managed-by: minecraft-k8s
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: survival
  namespace: minecraft
  labels:
    app.kubernetes.io/name: survival
    app.kubernetes.io/component: minecraft-server
    app.kubernetes.io/managed-by: minecraft-k8s
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: survival
  template:
    metadata:
      labels:
        app.kubernetes.io/name: survival
        app.kubernetes.io/component: minecraft-server
        app.kubernetes.io/managed-by: minecraft-k8s
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true
      containers:
        - name: minecraft
          image: ghcr.io/brianlechthaler/minecraft-k8s-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: minecraft
              containerPort: 25565
              protocol: TCP
            - name: rcon
              containerPort: 25575
              protocol: TCP
          env:
            - name: EULA
              value: "TRUE"
            - name: TYPE
              value: FORGE
            - name: VERSION
              value: "1.20.1"
            - name: FORGE_VERSION
              value: "47.2.0"
            - name: MEMORY
              value: 4G
            - name: MAX_PLAYERS
              value: "20"
            - name: MOTD
              value: Modded Minecraft on Kubernetes
            - name: ENABLE_RCON
              value: "true"
            - name: RCON_PASSWORD
              value: minecraft-k8s-rcon
            - name: RCON_PORT
              value: "25575"
            - name: USE_AIKAR_FLAGS
              value: "true"
            - name: SYNC_SKIP_NEWER_IN_DESTINATION
              value: "false"
          resources:
            requests:
              memory: 2Gi
              cpu: 500m
            limits:
              memory: 4G
              cpu: "2"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: mods
              mountPath: /data/mods
          readinessProbe:
            exec:
              command:
                - /usr/local/bin/minecraft-k8s
                - probe
                - --port
                - "25565"
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 12
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - /usr/local/bin/minecraft-k8s
                - probe
                - --port
                - "25565"
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 6
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: survival-data
        - name: mods
          persistentVolumeClaim:
            claimName: survival-mods
---
apiVersion: v1
kind: Service
metadata:
  name: survival-mc
  namespace: minecraft
  labels:
    app.kubernetes.io/name: survival
    app.kubernetes.io/component: minecraft-server
    app.kubernetes.io/managed-by: minecraft-k8s
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: survival
  ports:
    - name: minecraft
      port: 25565
      targetPort: minecraft
      protocol: TCP
