name: Release

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    name: Publish container images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push tools image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.rust
          push: true
          tags: |
            ghcr.io/brianlechthaler/minecraft-k8s-tools:latest
            ghcr.io/brianlechthaler/minecraft-k8s-tools:${{ github.sha }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.minecraft
          push: true
          tags: |
            ghcr.io/brianlechthaler/minecraft-k8s-server:latest
            ghcr.io/brianlechthaler/minecraft-k8s-server:${{ github.sha }}
