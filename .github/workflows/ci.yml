name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust-tests:
    name: Rust tests and coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build test container
        run: docker build -f docker/Dockerfile.rust-test -t minecraft-k8s-test:ci .

      - name: Run unit and integration tests
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" -w /src minecraft-k8s-test:ci \
            "cargo test --workspace --all-features"

      - name: Enforce 100% line coverage
        run: |
          docker run --rm --security-opt seccomp=unconfined -v "${{ github.workspace }}:/src" -w /src minecraft-k8s-test:ci \
            "cargo tarpaulin --workspace --out Xml --output-dir /tmp/coverage --fail-under 100 --timeout 300 --exclude-files '*/main.rs' '*/tests/*'"

  manifest-validation:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest
    needs: rust-tests
    steps:
      - uses: actions/checkout@v4

      - name: Build tools image
        run: docker build -f docker/Dockerfile.rust -t minecraft-k8s-tools:ci .

      - name: Assert manifests reference GHCR server image
        run: |
          grep -q 'ghcr.io/brianlechthaler/minecraft-k8s-server' k8s/manifests.yaml
          grep -q 'ghcr.io/brianlechthaler/minecraft-k8s-server' k8s/kustomization.yaml
          grep -q 'ghcr.io/brianlechthaler/minecraft-k8s-server' config/server.toml

      - name: Validate committed manifests
        run: |
          docker run --rm -v "${{ github.workspace }}:/src:ro" -w /src minecraft-k8s-tools:ci \
            check-manifests --path /src/k8s/manifests.yaml

      - name: Validate example config
        run: |
          docker run --rm -v "${{ github.workspace }}:/src:ro" -w /src minecraft-k8s-tools:ci \
            validate --config /src/config/server.toml

      - name: Render manifests from config and validate GHCR image
        run: |
          mkdir -p k8s/generated
          docker run --rm \
            -v "${{ github.workspace }}:/src:ro" \
            -v "${{ github.workspace }}/k8s/generated:/out" \
            -w /src \
            minecraft-k8s-tools:ci \
            render --config /src/config/server.toml --output /out/rendered.yaml
          docker run --rm -v "${{ github.workspace }}:/src:ro" -w /src minecraft-k8s-tools:ci \
            check-manifests --path /src/k8s/generated/rendered.yaml
          grep -q 'ghcr.io/brianlechthaler/minecraft-k8s-server' k8s/generated/rendered.yaml

  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: manifest-validation
    steps:
      - uses: actions/checkout@v4

      - name: Build Rust tools image
        run: docker build -f docker/Dockerfile.rust -t minecraft-k8s-tools:ci .

      - name: Build Minecraft server image
        run: docker build -f docker/Dockerfile.minecraft -t minecraft-k8s-server:ci .

      - name: Smoke test binaries in images
        run: |
          docker run --rm --entrypoint minecraft-k8s minecraft-k8s-server:ci --help
          docker run --rm minecraft-k8s-tools:ci --help
          docker run --rm -d --name mc-dashboard-smoke -p 18080:8080 minecraft-k8s-tools:ci \
            serve --bind-host 0.0.0.0 --bind-port 8080 --minecraft-host 127.0.0.1 --minecraft-port 1
          sleep 2
          curl -sf http://127.0.0.1:18080/api/status
          docker stop mc-dashboard-smoke

  publish-ghcr:
    name: Publish images to GHCR
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (server)
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/brianlechthaler/minecraft-k8s-server
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.minecraft
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}

      - name: Docker metadata (tools)
        id: meta-tools
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/brianlechthaler/minecraft-k8s-tools
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push tools image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.rust
          push: true
          tags: ${{ steps.meta-tools.outputs.tags }}
          labels: ${{ steps.meta-tools.outputs.labels }}

      - name: Set GHCR package visibility to public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for pkg in minecraft-k8s-server minecraft-k8s-tools; do
            status=$(gh api "user/packages/container/${pkg}" --jq '.visibility' 2>/dev/null || echo "unknown")
            echo "Current visibility for ${pkg}: ${status}"
            if [ "${status}" = "public" ]; then
              echo "✓ ${pkg} is already public"
              continue
            fi
            gh api --method PATCH "user/packages/container/${pkg}" \
              -f visibility=public
            echo "✓ ${pkg} is now public"
          done
