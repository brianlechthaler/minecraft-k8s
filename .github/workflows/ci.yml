name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rust-tests:
    name: Rust tests and coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build test container
        run: docker build -f docker/Dockerfile.rust-test -t minecraft-k8s-test:ci .

      - name: Run unit tests
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" -w /src minecraft-k8s-test:ci \
            "cargo test --workspace --all-features"

      - name: Run coverage (100% required)
        run: |
          docker run --rm --security-opt seccomp=unconfined -v "${{ github.workspace }}:/src" -w /src minecraft-k8s-test:ci \
            "cargo tarpaulin --workspace --out Xml --output-dir /tmp/coverage --fail-under 100 --timeout 300 --exclude-files '*/main.rs' '*/tests/*'"

  manifest-validation:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest
    needs: rust-tests
    steps:
      - uses: actions/checkout@v4

      - name: Build tools image
        run: docker build -f docker/Dockerfile.rust -t minecraft-k8s-tools:ci .

      - name: Validate committed manifests
        run: |
          docker run --rm -v "${{ github.workspace }}:/src:ro" -w /src minecraft-k8s-tools:ci \
            check-manifests --path /src/k8s/manifests.yaml

      - name: Validate example config
        run: |
          docker run --rm -v "${{ github.workspace }}:/src:ro" -w /src minecraft-k8s-tools:ci \
            validate --config /src/config/server.toml

      - name: Render manifests from config and validate
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src:ro" \
            -v "${{ github.workspace }}/k8s/generated:/out" \
            -w /src \
            minecraft-k8s-tools:ci \
            render --config /src/config/server.toml --output /out/rendered.yaml
          docker run --rm -v "${{ github.workspace }}:/src:ro" -w /src minecraft-k8s-tools:ci \
            check-manifests --path /src/k8s/generated/rendered.yaml

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: manifest-validation
    steps:
      - uses: actions/checkout@v4

      - name: Build Rust tools image
        run: docker build -f docker/Dockerfile.rust -t minecraft-k8s-tools:ci .

      - name: Build Minecraft server image
        run: docker build -f docker/Dockerfile.minecraft -t minecraft-k8s-server:ci .

      - name: Smoke test probe binary in server image
        run: |
          docker run --rm --entrypoint minecraft-k8s minecraft-k8s-server:ci --help
          docker run --rm minecraft-k8s-tools:ci --help
